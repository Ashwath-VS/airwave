# fly.toml app configuration file generated for s-ashwath-airwave on 2026-06-09T00:46:34+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 's-ashwath-airwave'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile.prod'

[env]
  FLASK_HOST = '127.0.0.1'
  FLASK_PORT = '5001'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
